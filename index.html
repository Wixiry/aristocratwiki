<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Base</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style.css">
    <style>
        /* Кастомная ширина сайдбара, чтобы влезло фото 600px */
        @media (min-width: 768px) {
            .custom-sidebar-width {
                width: 640px; /* 600px картинка + отступы */
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-300 h-screen flex overflow-hidden font-sans">
    
    <div id="overlay" class="fixed inset-0 bg-black/60 z-20 hidden md:hidden transition-opacity"></div>

    <aside id="sidebar" class="bg-zinc-900 custom-sidebar-width border-r border-zinc-800 flex flex-col fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out z-30">
        
        <div class="p-5 border-b border-zinc-800 flex justify-between items-start">
            <div class="flex flex-col items-center w-full">
                <img 
                    src="https://img.hugoinc.family/uploads/69b1c6fdb0af4_d3ad3542db75cebe.png" 
                    alt="Logo" 
                    style="width: 600px; height: 900px;" 
                    class="flex-shrink-0 object-fill rounded-lg shadow-2xl"
                    onerror="this.src='https://via.placeholder.com/600x900?text=Error+Loading+Image'"
                >
            </div>
            <button id="close-sidebar" class="md:hidden text-zinc-400 hover:text-white ml-2">
                <i data-lucide="x"></i>
            </button>
        </div>
        
        <div class="p-4 border-b border-zinc-800">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-2.5 h-4 w-4 text-zinc-500"></i>
                <input type="text" id="search" placeholder="Поиск..." class="w-full bg-zinc-950 border border-zinc-700 rounded-lg pl-9 pr-4 py-2 text-sm focus:outline-none focus:border-zinc-500 focus:ring-1 focus:ring-zinc-500 text-zinc-200 transition-all">
            </div>
        </div>
        
        <nav id="nav-links" class="flex-1 overflow-y-auto p-4 space-y-1 custom-scrollbar">
            </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto custom-scrollbar relative">
        <header class="md:hidden p-4 border-b border-zinc-800 flex items-center bg-zinc-900/80 backdrop-blur sticky top-0 z-10">
            <button id="open-sidebar" class="text-zinc-400 hover:text-white mr-4">
                <i data-lucide="menu"></i>
            </button>
            <img 
                src="https://img.hugoinc.family/uploads/69b1c6fdb0af4_d3ad3542db75cebe.png" 
                style="width: 40px; height: 60px;" 
                class="object-fill rounded-sm"
            >
        </header>

        <div class="p-6 md:p-12 max-w-4xl w-full mx-auto">
            <article id="content-area" class="wiki-content pb-20">
                </article>
        </div>
    </main>

    <script src="./script.js"></script>
    <script>
        // Инициализация иконок после загрузки
        lucide.createIcons();
    </script>
</body>
</html>
