<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Knowledge Base</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-zinc-950 text-zinc-300 h-screen flex overflow-hidden font-sans">
    
    <div id="overlay" class="fixed inset-0 bg-black/60 z-20 hidden md:hidden transition-opacity"></div>

    <aside id="sidebar" class="bg-zinc-900 w-72 border-r border-zinc-800 flex flex-col fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out z-30">
        
        <div class="p-5 border-b border-zinc-800 flex justify-between items-center">
            <h1 class="text-xl font-bold text-zinc-100 flex items-center gap-3">
                <img 
                    src="https://img.hugoinc.family/uploads/69b1c6fdb0af4_d3ad3542db75cebe.png" 
                    alt="Logo" 
                    style="width: 32px; height: 32px;" 
                    class="flex-shrink-0 object-fill rounded-sm"
                    onerror="this.src='https://via.placeholder.com/32?text=?'"
                >
                <span class="tracking-tight">Wiki</span>
            </h1>
            <button id="close-sidebar" class="md:hidden text-zinc-400 hover:text-white">
                <i data-lucide="x"></i>
            </button>
        </div>
        
        <div class="p-4 border-b border-zinc-800">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-2.5 h-4 w-4 text-zinc-500"></i>
                <input type="text" id="search" placeholder="Поиск статей..." class="w-full bg-zinc-950 border border-zinc-700 rounded-lg pl-9 pr-4 py-2 text-sm focus:outline-none focus:border-zinc-500 focus:ring-1 focus:ring-zinc-500 text-zinc-200 transition-all">
            </div>
        </div>
        
        <nav id="nav-links" class="flex-1 overflow-y-auto p-4 space-y-1 custom-scrollbar">
            </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto custom-scrollbar relative">
        
        <header class="md:hidden p-4 border-b border-zinc-800 flex items-center bg-zinc-900/80 backdrop-blur sticky top-0 z-10">
            <button id="open-sidebar" class="text-zinc-400 hover:text-white mr-4">
                <i data-lucide="menu"></i>
            </button>
            
            <img 
                src="https://img.hugoinc.family/uploads/69b1c6fdb0af4_d3ad3542db75cebe.png" 
                style="width: 24px; height: 24px;" 
                class="mr-3 object-fill rounded-sm"
            >
            <span class="text-lg font-semibold text-zinc-100">Wiki</span>
        </header>

        <div class="p-6 md:p-12 max-w-4xl w-full mx-auto">
            <article id="content-area" class="wiki-content pb-20">
                </article>
        </div>
    </main>

    <script src="./script.js"></script>
</body>
</html>
