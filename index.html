<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Knowledge Base</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style.css">
    <style>
        /* Принудительный скроллбар для навигации */
        .nav-scroll-area {
            overflow-y: auto !important;
            max-height: calc(100vh - 350px); /* Оставляем место под фото и поиск */
        }
        /* Кастомный вид скролла */
        .nav-scroll-area::-webkit-scrollbar { width: 4px; }
        .nav-scroll-area::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-300 h-screen flex overflow-hidden font-sans">
    
    <div id="overlay" class="fixed inset-0 bg-black/60 z-20 hidden md:hidden transition-opacity"></div>

    <aside id="sidebar" class="bg-zinc-900 w-80 border-r border-zinc-800 flex flex-col fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out z-30">
        
        <div class="p-5 flex flex-col items-center border-b border-zinc-800">
            <img 
                src="https://img.hugoinc.family/uploads/69b1d056b5e6b_6cb8c650ec6a9bd5.png" 
                alt="Logo" 
                class="w-full h-48 object-cover rounded-xl shadow-lg border border-zinc-800"
            >
        </div>
        
        <div class="p-4 border-b border-zinc-800">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-2.5 h-4 w-4 text-zinc-500"></i>
                <input type="text" id="search" placeholder="Поиск тем..." class="w-full bg-zinc-950 border border-zinc-700 rounded-lg pl-9 pr-4 py-2 text-sm focus:outline-none focus:border-blue-500/50 text-zinc-200">
            </div>
        </div>
        
        <div class="flex-1 nav-scroll-area">
            <nav id="nav-links" class="p-4 space-y-1">
                </nav>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">
        <header class="md:hidden p-4 border-b border-zinc-800 flex items-center justify-between bg-zinc-900/80 backdrop-blur">
            <button id="open-sidebar" class="text-zinc-400"><i data-lucide="menu"></i></button>
            <span class="font-bold text-zinc-100">Database</span>
        </header>

        <div class="flex-1 overflow-y-auto custom-scrollbar">
            <div class="p-6 md:p-12 max-w-4xl mx-auto">
                <article id="content-area" class="wiki-content">
                    </article>
            </div>
        </div>
    </main>

    <script src="./script.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            // Если темы все еще не видно, убедись, что в script.js есть массив articles
            if (typeof renderNavigation === 'function') {
                renderNavigation();
                loadArticle();
            }
        });
    </script>
</body>
</html>
