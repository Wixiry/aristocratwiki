<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galactic Tactical Map</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-jedi: #00111a;
    --bg-sith: #1a0000;
    --glow-jedi: rgba(0, 170, 255, 0.6);
    --glow-sith: rgba(255, 50, 0, 0.6);
    --planet-jedi: #00aaff;
    --planet-sith: #ff3300;
    --ui-font: 'Share Tech Mono', monospace;
  }
  body {
    margin: 0; padding: 0;
    background: var(--bg-jedi);
    font-family: var(--ui-font);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #0f0;
  }
  #galaxy-container {
    perspective: 1000px;
    width: 100%; height: 80%;
    position: relative;
    overflow: visible;
  }
  .planet {
    position: absolute;
    border-radius: 50%;
    border: 2px solid;
    cursor: pointer;
    animation: rotatePlanet linear infinite;
    text-align: center;
    font-size: 10px;
    color: #fff;
    line-height: 1;
  }
  @keyframes rotatePlanet {
    0% { transform: rotateY(0deg) rotateX(0deg); }
    100% { transform: rotateY(360deg) rotateX(360deg); }
  }
  #controls {
    margin-top: 10px;
    display: flex; gap: 10px;
  }
  .btn {
    padding: 10px 15px;
    border: 1px solid #0f0;
    background: transparent;
    color: #0f0;
    cursor: pointer;
    text-transform: uppercase;
    font-family: var(--ui-font);
    transition: 0.2s;
  }
  .btn:hover { background: #0f0; color: #000; }
  .warp {
    position: absolute;
    border-radius: 50%;
    border: 2px solid var(--glow-jedi);
    width: 0; height: 0;
    animation: warpAnim 0.6s forwards;
    pointer-events: none;
  }
  @keyframes warpAnim {
    0% { width: 0; height: 0; opacity: 1; }
    100% { width: 200px; height: 200px; opacity: 0; }
  }
</style>
</head>
<body>

<div id="galaxy-container"></div>

<div id="controls">
  <button class="btn" id="toggle-theme">Toggle Jedi/Sith</button>
  <button class="btn" id="simulate-warp">Simulate Warp</button>
</div>

<audio id="beep-sound" src="https://freesound.org/data/previews/256/256113_3263906-lq.mp3"></audio>
<audio id="confirm-sound" src="https://freesound.org/data/previews/170/170623_2437358-lq.mp3"></audio>
<audio id="alert-sound" src="https://freesound.org/data/previews/353/353738_5121236-lq.mp3"></audio>

<script>
const galaxy = document.getElementById('galaxy-container');
const beepSound = document.getElementById('beep-sound');
const confirmSound = document.getElementById('confirm-sound');
const alertSound = document.getElementById('alert-sound');

let theme = 'jedi';

const planetsData = [
  {name: 'Coruscant', size: 60, x: 20, y: 30, color: 'planet-jedi'},
  {name: 'Tatooine', size: 40, x: 70, y: 10, color: 'planet-jedi'},
  {name: 'Hoth', size: 50, x: 50, y: 60, color: 'planet-jedi'},
  {name: 'Mustafar', size: 50, x: 80, y: 50, color: 'planet-sith'},
  {name: 'Dathomir', size: 45, x: 30, y: 70, color: 'planet-sith'}
];

function createPlanets() {
  galaxy.innerHTML = '';
  planetsData.forEach(p => {
    const planet = document.createElement('div');
    planet.className = 'planet';
    planet.style.width = p.size + 'px';
    planet.style.height = p.size + 'px';
    planet.style.left = p.x + '%';
    planet.style.top = p.y + '%';
    planet.style.borderColor = getComputedStyle(document.documentElement).getPropertyValue(`--${theme === 'jedi' ? 'planet-jedi' : 'planet-sith'}`);
    planet.style.background = 'rgba(0,0,0,0.3)';
    planet.textContent = p.name;
    planet.onclick = () => triggerWarp(planet);
    galaxy.appendChild(planet);
  });
}

function triggerWarp(el) {
  const warp = document.createElement('div');
  warp.className = 'warp';
  warp.style.left = (el.offsetLeft + el.offsetWidth/2 - 100) + 'px';
  warp.style.top = (el.offsetTop + el.offsetHeight/2 - 100) + 'px';
  warp.style.borderColor = theme === 'jedi' ? 'var(--glow-jedi)' : 'var(--glow-sith)';
  galaxy.appendChild(warp);
  confirmSound.play();
  setTimeout(() => warp.remove(), 600);
}

document.getElementById('toggle-theme').onclick = () => {
  theme = theme === 'jedi' ? 'sith' : 'jedi';
  document.body.style.background = theme === 'jedi' ? 'var(--bg-jedi)' : 'var(--bg-sith)';
  createPlanets();
  beepSound.play();
}

document.getElementById('simulate-warp').onclick = () => {
  const randomPlanet = galaxy.children[Math.floor(Math.random()*galaxy.children.length)];
  triggerWarp(randomPlanet);
  alertSound.play();
}

// Initial render
createPlanets();

</script>
</body>
</html>
