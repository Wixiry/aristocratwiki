<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Knowledge Base</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style.css">
    <style>
        /* Плавный вертикальный скролл для списка тем */
        .nav-scroll-area {
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #3f3f46 transparent;
        }
        .nav-scroll-area::-webkit-scrollbar {
            width: 4px;
        }
        .nav-scroll-area::-webkit-scrollbar-thumb {
            background-color: #3f3f46;
            border-radius: 20px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-300 h-screen flex overflow-hidden font-sans">
    
    <div id="overlay" class="fixed inset-0 bg-black/60 z-20 hidden md:hidden transition-opacity"></div>

    <aside id="sidebar" class="bg-zinc-900 w-80 border-r border-zinc-800 flex flex-col fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out z-30">
        
        <div class="p-5 flex flex-col items-center border-b border-zinc-800">
            <img 
                src="https://img.hugoinc.family/uploads/69b1c6fdb0af4_d3ad3542db75cebe.png" 
                alt="Logo" 
                class="w-full h-48 object-cover rounded-xl shadow-lg border border-zinc-700/50 transition-transform hover:scale-[1.02] duration-300"
                onerror="this.style.display='none'"
            >
        </div>
        
        <div class="p-4 border-b border-zinc-800">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-2.5 h-4 w-4 text-zinc-500"></i>
                <input type="text" id="search" placeholder="Поиск по разделам..." class="w-full bg-zinc-950 border border-zinc-700 rounded-lg pl-9 pr-4 py-2 text-sm focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 text-zinc-200 transition-all">
            </div>
        </div>
        
        <div class="flex-1 nav-scroll-area">
            <nav id="nav-links" class="p-4 space-y-1">
                </nav>
        </div>
        
        <div class="p-4 border-t border-zinc-800 text-[10px] text-zinc-600 uppercase tracking-widest text-center">
            Database v1.0
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden relative">
        <header class="md:hidden p-4 border-b border-zinc-800 flex items-center justify-between bg-zinc-900/80 backdrop-blur sticky top-0 z-10">
            <button id="open-sidebar" class="text-zinc-400 hover:text-white">
                <i data-lucide="menu"></i>
            </button>
            <img src="https://img.hugoinc.family/uploads/69b1c6fdb0af4_d3ad3542db75cebe.png" class="h-8 w-8 object-cover rounded-md">
        </header>

        <div class="flex-1 overflow-y-auto custom-scrollbar">
            <div class="p-6 md:p-12 max-w-4xl mx-auto">
                <article id="content-area" class="wiki-content">
                    </article>
            </div>
        </div>
    </main>

    <script src="./script.js"></script>
    <script>
        // Инициализация иконок
        lucide.createIcons();
    </script>
</body>
</html>
